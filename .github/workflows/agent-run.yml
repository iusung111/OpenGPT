name: agent-run

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Queue job id"
        required: true
        type: string
      operation_type:
        description: "write_files | append_files | run_commands | mixed"
        required: true
        type: string
      base_branch:
        description: "Base branch"
        required: true
        default: "main"
        type: string
      target_paths:
        description: "Comma-separated paths"
        required: false
        default: ""
        type: string
      instructions_b64:
        description: "Base64 encoded structured operation instructions"
        required: true
        type: string
      pr_title:
        description: "PR title"
        required: false
        default: ""
        type: string
      pr_body:
        description: "PR body"
        required: false
        default: ""
        type: string
      auto_improve:
        description: "Enable queue-based auto improvement cycle"
        required: true
        default: false
        type: boolean
      request_kind:
        description: "self_improvement | feature_delivery"
        required: true
        default: "self_improvement"
        type: string
      project_slug:
        description: "Short kebab-case project slug for chat-requested implementation work"
        required: false
        default: ""
        type: string
      create_project_scaffold:
        description: "Create docs/projects/<slug>.md and projects/<slug>/ scaffold"
        required: true
        default: false
        type: boolean
      runner_label:
        description: "GitHub-hosted runner label such as ubuntu-latest or windows-latest"
        required: true
        default: "ubuntu-latest"
        type: string
      dry_run:
        description: "Skip push and PR creation"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: agent-run-${{ inputs.job_id }}
  cancel-in-progress: true

jobs:
  run-agent-task:
    runs-on: ${{ inputs.runner_label }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 1

      - name: Set branch name
        id: vars
        run: |
          slug="${{ inputs.project_slug }}"
          slug_suffix=""
          if [ -n "$slug" ]; then
            slug_suffix="-$slug"
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "branch_name=${{ inputs.base_branch }}" >> "$GITHUB_OUTPUT"
            echo "should_create_branch=false" >> "$GITHUB_OUTPUT"
          else
            echo "branch_name=agent/${{ inputs.job_id }}${slug_suffix}-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
            echo "should_create_branch=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Python command
        id: python
        run: |
          if command -v python3 >/dev/null 2>&1; then
            echo "cmd=python3" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=python" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch
        if: steps.vars.outputs.should_create_branch == 'true'
        run: |
          git checkout -b "${{ steps.vars.outputs.branch_name }}"

      - name: Link queue job to workflow run
        env:
          MCP_QUEUE_URL: ${{ secrets.MCP_QUEUE_URL }}
          MCP_QUEUE_TOKEN: ${{ secrets.MCP_QUEUE_TOKEN }}
        run: |
          "${{ steps.python.outputs.cmd }}" - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          queue_url = os.environ.get("MCP_QUEUE_URL", "").strip()
          queue_token = os.environ.get("MCP_QUEUE_TOKEN", "").strip()
          if not queue_url or not queue_token:
              print("Queue linkage skipped: MCP_QUEUE_URL or MCP_QUEUE_TOKEN is not configured")
              raise SystemExit(0)

          payload = {
              "action": "job_update_status",
              "job_id": "${{ inputs.job_id }}",
              "status": "working",
              "next_actor": "system",
              "job": {
                  "workflow_run_id": int("${{ github.run_id }}"),
                  "work_branch": "${{ steps.vars.outputs.branch_name }}",
              },
          }
          request = urllib.request.Request(
              queue_url.rstrip("/") + "/queue",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "content-type": "application/json",
                  "accept": "application/json",
                  "user-agent": "GitHub-Actions-OpenGPT-Agent-Run/1.0",
                  "x-queue-token": queue_token,
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(request) as response:
                  body = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as exc:
              detail = exc.read().decode("utf-8", errors="replace")
              raise SystemExit(f"Queue linkage failed: {exc.code} {detail}")

          if not body.get("ok"):
              raise SystemExit(f"Queue linkage failed: {json.dumps(body)}")

          print("Linked queue job to workflow run")
          PY

      - name: Prepare input payload
        run: |
          mkdir -p .agent-input .agent-output
          "${{ steps.python.outputs.cmd }}" - <<'PY'
          import base64
          import json
          from pathlib import Path

          raw = """${{ inputs.instructions_b64 }}"""
          payload = json.loads(base64.b64decode(raw).decode("utf-8"))
          payload.setdefault("request_kind", "${{ inputs.request_kind }}")
          payload.setdefault("project_slug", "${{ inputs.project_slug }}")
          payload.setdefault("create_project_scaffold", "${{ inputs.create_project_scaffold }}".lower() == "true")
          Path(".agent-input/instructions.json").write_text(
              json.dumps(payload, indent=2),
              encoding="utf-8",
          )
          PY

      - name: Execute structured agent payload
        run: |
          "${{ steps.python.outputs.cmd }}" scripts/agent_run.py

      - name: Detect changes
        id: diff
        run: |
          if git status --short | grep .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "agent-run: ${{ inputs.operation_type }} (${{ inputs.job_id }})"

      - name: Push branch
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run == false
        run: |
          git push --set-upstream origin "${{ steps.vars.outputs.branch_name }}"

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run == false && inputs.pr_title != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "${{ inputs.pr_title }}" \
            --body "${{ inputs.pr_body }}" \
            --base "${{ inputs.base_branch }}" \
            --head "${{ steps.vars.outputs.branch_name }}"

      - name: Link queue job to pull request
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run == false && inputs.pr_title != ''
        env:
          GH_TOKEN: ${{ github.token }}
          MCP_QUEUE_URL: ${{ secrets.MCP_QUEUE_URL }}
          MCP_QUEUE_TOKEN: ${{ secrets.MCP_QUEUE_TOKEN }}
        run: |
          pr_number="$(gh api "repos/${{ github.repository }}/pulls?state=open&head=${{ github.repository_owner }}:${{ steps.vars.outputs.branch_name }}" --jq '.[0].number')"
          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            echo "Queue PR linkage skipped: no PR number found for branch ${{ steps.vars.outputs.branch_name }}"
            exit 0
          fi
          export PR_NUMBER="$pr_number"

          "${{ steps.python.outputs.cmd }}" - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          queue_url = os.environ.get("MCP_QUEUE_URL", "").strip()
          queue_token = os.environ.get("MCP_QUEUE_TOKEN", "").strip()
          if not queue_url or not queue_token:
              print("Queue PR linkage skipped: MCP_QUEUE_URL or MCP_QUEUE_TOKEN is not configured")
              raise SystemExit(0)

          payload = {
              "action": "job_update_status",
              "job_id": "${{ inputs.job_id }}",
              "status": "working",
              "next_actor": "system",
              "job": {
                  "workflow_run_id": int("${{ github.run_id }}"),
                  "work_branch": "${{ steps.vars.outputs.branch_name }}",
                  "pr_number": int(os.environ["PR_NUMBER"]),
              },
          }
          request = urllib.request.Request(
              queue_url.rstrip("/") + "/queue",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "content-type": "application/json",
                  "accept": "application/json",
                  "user-agent": "GitHub-Actions-OpenGPT-Agent-Run/1.0",
                  "x-queue-token": queue_token,
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(request) as response:
                  body = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as exc:
              detail = exc.read().decode("utf-8", errors="replace")
              raise SystemExit(f"Queue PR linkage failed: {exc.code} {detail}")

          if not body.get("ok"):
              raise SystemExit(f"Queue PR linkage failed: {json.dumps(body)}")

          print(f"Linked queue job to PR #{os.environ['PR_NUMBER']}")
          PY

      - name: Write workflow manifest
        if: always()
        run: |
          "${{ steps.python.outputs.cmd }}" - <<'PY'
          import json
          from pathlib import Path

          Path(".agent-output").mkdir(parents=True, exist_ok=True)
          manifest_path = Path(".agent-output/manifest.json")
          payload = {}
          if manifest_path.exists():
              payload = json.loads(manifest_path.read_text(encoding="utf-8"))
          payload.update({
              "job_id": "${{ inputs.job_id }}",
              "operation_type": "${{ inputs.operation_type }}",
              "base_branch": "${{ inputs.base_branch }}",
              "target_paths": "${{ inputs.target_paths }}",
              "work_branch": "${{ steps.vars.outputs.branch_name }}",
              "auto_improve": "${{ inputs.auto_improve }}".lower() == "true",
              "request_kind": "${{ inputs.request_kind }}",
              "project_slug": "${{ inputs.project_slug }}",
              "create_project_scaffold": "${{ inputs.create_project_scaffold }}".lower() == "true",
              "runner_label": "${{ inputs.runner_label }}",
              "dry_run": "${{ inputs.dry_run }}".lower() == "true",
              "changed": "${{ steps.diff.outputs.changed }}".lower() == "true",
              "run_id": "${{ github.run_id }}"
          })
          manifest_path.write_text(json.dumps(payload, indent=2), encoding="utf-8")
          PY
      - name: Upload build artifacts
        if: always() && hashFiles('dist/**', 'build/**', '*.spec') != ''
        uses: actions/upload-artifact@v4
        with:
          name: agent-run-build-output
          path: |
            dist
            build
            *.spec

      - name: Upload manifest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-run-manifest
          path: .agent-output
