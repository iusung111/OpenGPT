name: cloudflare-live-deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cloudflare-live-deploy.yml"
      - "wrangler.toml"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLABE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate deploy inputs
        run: |
          [ -n "$CLOUDFLARE_API_TOKEN" ] || { echo "Missing CLOUDFLARE_API_TOKEN" >&2; exit 1; }
          [ -n "$CLOUDFLARE_ACCOUNT_ID" ] || { echo "Missing CLOUDFLABE_ACCOUNT_ID" >&2; exit 1; }
          [ -f "wrangler.toml" ] || { echo "Missing wrangler.toml" >&2; exit 1; }
          [ -f "src/worker.js" ] || { echo "Missing src/worker.js" >&2; exit 1; }

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy to Cloudflare Workers
        run: |
          wrangler deploy --config wrangler.toml

      - name: Health check (optional)
        if: ${{ secrets.LIVE_HEALTHCHECK_URL != '' }}
        env:
          LIVE_HEALTHCHECK_URL: ${{ secrets.LIVE_HEALTHCHECK_URL }}
          LIVE_HEALTHCHECK_TOKEN: ${{ secrets.LIVE_HEALTHCHECK_TOKEN }}
        run: |
          HEADERS=()
          if [ -n "$LIVE_HEALTHCHECK_TOKEN" ]; then
            HEADERS+=( -H "Authorization: Bearer $LIVE_HEALTHCHECK_TOKEN" )
          fi
          curl --fail --show-error "${HEADERS[@]}" "$LIVE_HEALTHCHECK_URL"
