name: cloudflare-live-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler deploy

      - name: Health check (optional)
        if: ${{ secrets.LIVE_HEALTHCHECK_URL != '' }}
        env:
          LIVE_HEALTHCHECK_URL: ${{ secrets.LIVE_HEALTHCHECK_URL }}
          LIVE_HEALTHCHECK_TOKEN: ${{ secrets.LIVE_HEALTHCHECK_TOKEN }}
        run: |
          HEADERS=()
          if [ -n "$LIVE_HEALTHCHECK_TOKEN" ]; then
            HEADERS+=( -H "Authorization: Bearer $LIVE_HEALTHCHECK_TOKEN" )
          fi
          curl --fail --show-error "${HEADERS[@]}" "$LIVE_HEALTHCHECK_URL"
